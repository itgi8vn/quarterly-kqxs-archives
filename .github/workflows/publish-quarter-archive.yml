name: Publish quarter archive

on:
  repository_dispatch:
    types: [quarter_archive_publish]

permissions:
  contents: write

concurrency:
  group: quarter-archive-${{ github.event.client_payload.quarter_id }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate and stage archive
        env:
          ARCHIVE_ID: ${{ github.event.client_payload.archive_id }}
          QUARTER_ID: ${{ github.event.client_payload.quarter_id }}
          DOWNLOAD_URL: ${{ github.event.client_payload.download_url }}
          MANIFEST_URL: ${{ github.event.client_payload.manifest_url }}
          EXPECTED_SHA256: ${{ github.event.client_payload.sha256 }}
        run: python scripts/publish_archive.py --repo .
      - name: Commit public archive
        run: |
          if [ -z "$(git status --porcelain -- archives)" ]; then
            echo "Archive already published with the same SHA-256."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- archives
          git diff --cached --check
          git commit -m "Publish KQXS archive ${QUARTER_ID}"
          git push
        env:
          QUARTER_ID: ${{ github.event.client_payload.quarter_id }}
